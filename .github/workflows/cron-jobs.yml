name: Cron Jobs

# High-frequency cron jobs live here instead of vercel.json because the Vercel
# Hobby plan caps cron jobs at once/day and 2 jobs max. Only the weekly
# newsletter cron remains in vercel.json; everything sub-daily runs here.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   CRON_APP_URL   Base URL of the deployed app, e.g. https://rebirth-content-studio.vercel.app (no trailing slash)
#   CRON_SECRET    Same value as the CRON_SECRET env var configured in Vercel
#
# NOTE: GitHub Actions schedules run only from the default branch, and the
# effective minimum interval is ~5 min (every-minute schedules are coalesced
# and may be delayed under load). Reminders therefore run every 5 min instead
# of every minute — the endpoint processes all due reminders each run, so they
# fire at most ~5 min late.

on:
  schedule:
    - cron: "*/5 * * * *"  # publish + reminders
    - cron: "0 */6 * * *"  # veille scan
  workflow_dispatch:

concurrency:
  group: cron-jobs-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  publish-and-reminders:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Publish scheduled posts
        run: |
          curl -fsS --max-time 60 -X GET "${CRON_APP_URL}/api/cron/publish" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          CRON_APP_URL: ${{ secrets.CRON_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - name: Process due reminders
        run: |
          curl -fsS --max-time 60 -X GET "${CRON_APP_URL}/api/cron/reminders" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          CRON_APP_URL: ${{ secrets.CRON_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  veille:
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Run veille scan
        run: |
          curl -fsS --max-time 120 -X GET "${CRON_APP_URL}/api/cron/veille" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          CRON_APP_URL: ${{ secrets.CRON_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
